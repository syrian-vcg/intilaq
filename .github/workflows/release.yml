name: إطلاق حزمة الانطلاق

# يعمل فقط عند دفع (push) وسم (tag) بصيغة v* مثل v1.0.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ------------------------------------------------------------------
  # المهمة 1: بناء تطبيق الأندرويد (APK) وتوقيعه ذاتيًا للتوزيع المباشر
  # ------------------------------------------------------------------
  build-android:
    name: بناء تطبيق الأندرويد
    runs-on: ubuntu-latest
    env:
      KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'intilaq123' }}
      KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || 'intilaq123' }}
      INTILAQ_VERSION_NAME: ${{ github.ref_name }}
    steps:
      - name: استنساخ المستودع
        uses: actions/checkout@v4

      - name: إعداد JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: تثبيت حزمة Android SDK المطلوبة (API 34)
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: صلاحية التنفيذ لـ gradlew
        run: chmod +x ./gradlew
        working-directory: android-app

      - name: إنشاء مفتاح توقيع مؤقت للتوزيع المباشر
        working-directory: android-app
        run: |
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias intilaq \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -dname "CN=Intilaq, OU=Intilaq, O=Intilaq, L=Riyadh, S=Riyadh, C=SA"

      - name: بناء APK (release)
        working-directory: android-app
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/release.keystore \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias=intilaq \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: تشغيل اختبارات الوحدة
        working-directory: android-app
        run: ./gradlew test

      - name: تجهيز اسم الملف النهائي
        working-directory: android-app
        run: |
          mkdir -p ../release-artifacts
          cp app/build/outputs/apk/release/app-release.apk \
             ../release-artifacts/intilaq-${{ github.ref_name }}.apk

      - name: رفع APK كمُخرَج (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: intilaq-apk
          path: release-artifacts/*.apk

  # ------------------------------------------------------------------
  # المهمة 2: تحزيم إضافة VS Code (.vsix)
  # ------------------------------------------------------------------
  build-vscode-extension:
    name: تحزيم إضافة VS Code
    runs-on: ubuntu-latest
    steps:
      - name: استنساخ المستودع
        uses: actions/checkout@v4

      - name: إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: تثبيت أداة vsce
        run: npm install -g @vscode/vsce

      - name: تحديث رقم الإصدار من اسم الوسم (tag)
        working-directory: vscode-extension
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm pkg set version="$VERSION" --no-git-tag-version

      - name: تحزيم الإضافة
        working-directory: vscode-extension
        run: |
          mkdir -p ../release-artifacts
          vsce package --out ../release-artifacts/intilaq-${{ github.ref_name }}.vsix --allow-missing-repository --skip-license

      - name: رفع VSIX كمُخرَج (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: intilaq-vsix
          path: release-artifacts/*.vsix

  # ------------------------------------------------------------------
  # المهمة 3: إنشاء إصدار GitHub Release ورفع الملفين معًا
  # ------------------------------------------------------------------
  create-release:
    name: إصدار النسخة على GitHub
    needs: [build-android, build-vscode-extension]
    runs-on: ubuntu-latest
    steps:
      - name: تنزيل APK
        uses: actions/download-artifact@v4
        with:
          name: intilaq-apk
          path: release-artifacts

      - name: تنزيل VSIX
        uses: actions/download-artifact@v4
        with:
          name: intilaq-vsix
          path: release-artifacts

      - name: عرض الملفات النهائية
        run: ls -la release-artifacts

      - name: إنشاء الإصدار ورفع الملفات
        uses: softprops/action-gh-release@v2
        with:
          name: الانطلاق ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-artifacts/*.apk
            release-artifacts/*.vsix
          body: |
            ## حزمة الانطلاق ${{ github.ref_name }}

            ### الملفات المرفقة
            - **`intilaq-${{ github.ref_name }}.apk`** — تطبيق الأندرويد (محرر + محرك تحليل لغة الانطلاق). يحتاج تفعيل "السماح بتثبيت من مصادر غير معروفة" عند التثبيت اليدوي.
            - **`intilaq-${{ github.ref_name }}.vsix`** — إضافة VS Code لتلوين صياغة لغة الانطلاق. تُثبَّت عبر: `code --install-extension intilaq-${{ github.ref_name }}.vsix` أو من قائمة Extensions → ... → Install from VSIX.
